services:
  postgres:
    image: postgres:16-alpine
    container_name: vabis-postgres
    environment:
      POSTGRES_DB: vabis
      POSTGRES_USER: vabis
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vabis-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: vabis-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: vabis
      MINIO_ROOT_PASSWORD: secret123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: vabis-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
    volumes:
      - mailpit_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mailpit_data:
